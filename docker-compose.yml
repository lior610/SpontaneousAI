services:
  # 1. The Database
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. Attraction Engine (Python)
  engine:
    build: ./engine
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./engine:/app
      - ./shared/python:/shared-python
    environment:
      - PYTHONPATH=/app:/shared-python
    depends_on:
      - db
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # 3. API (Node.js)
  api:
    build: ./api
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      - db
      - engine
    command: npm run dev

  web:
    build: ./web
    ports:
      - "5173:5173"
    env_file: .env
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev

  foursquare-scraper-ny:
    build: ./data-pipeline/src/scrapers/foursquare
    env_file: .env
    volumes:
      - ./data-pipeline/src/scrapers/foursquare:/app
      # Mount shared python if needed, matching other services
      - ./shared/python:/shared-python
    environment:
      - PYTHONPATH=/app:/shared-python
      - FOURSQUARE_OUTPUT_FILE=foursquare_ny_attractions.json
      - FOURSQUARE_LAT_MIN=40.49
      - FOURSQUARE_LAT_MAX=40.92
      - FOURSQUARE_LON_MIN=-74.27
      - FOURSQUARE_LON_MAX=-73.68
    # No ports needed as it's a background worker

volumes:
  postgres_data:
