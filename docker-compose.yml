version: '3.8'

services:
  # 1. The Database
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. The AI Brain (Python)
  engine:
    build: ./engine
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      -./engine:/app 
    depends_on:
      - db
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  api:
    build: ./api
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      -./api:/app
      - /app/node_modules          
    depends_on:
      - db
      - engine
    command: npm run dev

  web:
    build: ./web
    ports:
      - "5173:5173"
    env_file: .env
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev

volumes:
  postgres_data: