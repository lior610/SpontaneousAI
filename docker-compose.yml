services:
  # 1. Attraction Engine (Python)
  engine:
    build: ./engine
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./engine:/app
      - ./shared/python:/shared-python
    environment:
      - PYTHONPATH=/app:/shared-python
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # 2. API (Node.js)
  api:
    build: ./api
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - ENGINE_HOST=engine  # Override for Docker; .env uses localhost for local runs
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      - engine
    command: npm run dev

  web:
    build: ./web
    ports:
      - "5173:5173"
    env_file: .env
    environment:
      - VITE_API_URL=http://api:3000
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev

